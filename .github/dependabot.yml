version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Toronto
    groups:
      python-runtime:
        dependency-type: production
        update-types: [minor, patch]
      python-development:
        dependency-type: development
        update-types: [minor, patch]
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: America/Toronto
    groups:
      node-development:
        dependency-type: development
        update-types: [minor, patch]
    open-pull-requests-limit: 3
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: America/Toronto
    groups:
      github-actions:
        patterns: ["*"]
        update-types: [minor, patch]
    open-pull-requests-limit: 3

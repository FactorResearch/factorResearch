name: Security audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install pip-audit bandit cyclonedx-bom
      - run: pip-audit -r requirements.txt --strict
      - run: bandit -q -r codes -x tests
      - run: npm ci && npm audit --audit-level=high
      - name: Generate software bill of materials
        run: cyclonedx-py requirements requirements.txt --output-format JSON --output-file sbom-python.json
      - uses: actions/upload-artifact@v4
        with:
          name: security-sbom
          path: sbom-python.json

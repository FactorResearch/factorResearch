name: PR validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend audit dependencies
        run: npm ci

      - name: Compile application
        run: python -m compileall -q codes

      - name: Compile styles
        run: npx --yes sass assets/style.scss /tmp/factorresearch.css --no-source-map

      - name: Run full regression suite
        env:
          APP_SKIP_STARTUP: "1"
          APP_FEATURE_FLAG: V1
        run: pytest -q

      - name: Check repository diff
        run: git diff --check

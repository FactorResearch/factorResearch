name: PR validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile application
        run: python -m compileall -q codes

      - name: Run stable shared regression tests
        run: |
          pytest -q \
            tests/test_security.py \
            tests/test_app_flags_markets.py \
            tests/test_market_provider_registry.py \
            tests/test_screener_market_routing.py \
            tests/test_track_b_canada_db.py \
            tests/test_track_b_canada_ingestion.py \
            tests/test_track_b_canada_provider.py \
            tests/test_track_b_canada_sec.py

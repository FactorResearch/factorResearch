name: pip-audit

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pip-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    # Weekly scan even if no dependency changes are pushed
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v9
        with:
          python-version: "3.12"
          version: "0.11.30"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked audit tooling
        run: uv sync --frozen

      - name: Export and audit the locked runtime graph
        run: |
          uv export --quiet --frozen --no-dev --no-emit-project --output-file /tmp/factorresearch-runtime.txt
          uv run --frozen pip-audit -r /tmp/factorresearch-runtime.txt --strict

name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development, unknown
          license-check: true
          vulnerability-check: true
          deny-licenses: AGPL-3.0, GPL-3.0, SSPL-1.0, BUSL-1.1

  rust-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2.1.1
        with:
          rust-version: "1.97.1"
          manifest-path: native/factorresearch_core/Cargo.toml
          command: check
          command-arguments: bans licenses sources
